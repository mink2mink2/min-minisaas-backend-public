name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_PROJECT_ID: min-minisaas-487110
  GCP_REGION: asia-northeast1
  SERVICE_NAME: min-minisaas-backend
  REGISTRY_HOSTNAME: asia-northeast1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY_HOSTNAME }}

      - name: Build and push Docker image
        run: |
          IMAGE_URL="${{ env.REGISTRY_HOSTNAME }}/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          IMAGE_URL_LATEST="${{ env.REGISTRY_HOSTNAME }}/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:latest"

          docker build -t $IMAGE_URL -t $IMAGE_URL_LATEST .
          docker push $IMAGE_URL
          docker push $IMAGE_URL_LATEST

      - name: Deploy to Cloud Run
        run: |
          IMAGE_URL="${{ env.REGISTRY_HOSTNAME }}/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=$IMAGE_URL \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --vpc-connector=${{ secrets.VPC_CONNECTOR_NAME }} \
            --vpc-egress=all-traffic \
            --memory=512Mi \
            --cpu=1 \
            --timeout=3600 \
            --max-instances=100 \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,REDIS_PASSWORD=REDIS_PASSWORD:latest,SECRET_KEY=SECRET_KEY:latest,API_SECRET_KEY=API_SECRET_KEY:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest" \
            --set-env-vars="ENVIRONMENT=production,BCRYPT_ROUNDS=12,ACCESS_TOKEN_EXPIRE_MINUTES=15,REFRESH_TOKEN_EXPIRE_DAYS=7,SESSION_TTL_MIN=30,COOKIE_SECURE=true,COOKIE_SAMESITE=lax,DESKTOP_ACCESS_EXPIRE_MINUTES=60,DESKTOP_REFRESH_EXPIRE_DAYS=30,DEVICE_ACCESS_EXPIRE_HOURS=24,DEVICE_REFRESH_EXPIRE_DAYS=90,FIREBASE_JWKS_URI=https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com"

      - name: Get Cloud Run URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Service deployed to: $SERVICE_URL"
